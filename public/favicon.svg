<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Camera Body -->
  <rect x="33" y="30" width="34" height="56" rx="4" fill="#1A1A1A" stroke="#FFFFFF" stroke-width="3"/>
  <!-- Viewfinder Hood (Opened) -->
  <path d="M36 30 L42 16 L58 16 L64 30 Z" fill="#1A1A1A" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
  <!-- Top Lens (Viewing) -->
  <circle cx="50" cy="46" r="8" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="50" cy="46" r="3" fill="#FFFFFF"/>
  <!-- Bottom Lens (Taking) -->
  <circle cx="50" cy="70" r="10" fill="none" stroke="#FFFFFF" stroke-width="3.5"/>
  <circle cx="50" cy="70" r="4" fill="#FFFFFF"/>
  <!-- Nameplate -->
  <rect x="42" y="34" width="16" height="3" fill="#FFFFFF"/>
  <!-- Side Focus Knob -->
  <rect x="27" y="52" width="6" height="14" rx="2" fill="#FFFFFF"/>
  <!-- Shattles / Details -->
  <circle cx="39" cy="80" r="2" fill="#FFFFFF"/>
  <circle cx="61" cy="80" r="2" fill="#FFFFFF"/>
</svg>
